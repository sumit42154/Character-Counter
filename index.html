<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="./c2.css">
    <title>Character Counter</title>
</head>

<body class="bg-[#0f1829] text-white flex justify-center items-center h-screen font-sans">
    <div class="conatiner w-screen max-w-[600px] px-3">
        <div class="card bg-[#1e2a3a]  rounded-xl border border-[#334155] p-[32px]">
            <div class="card-header text-center mb-[24px]">
                <h1 class="text-2xl font-bold">Character Counter</h1>
                <p class="subtitle text-[#95a5b9] text-sm">Type Your Msg Below</p>
            </div>

            <textarea class="text-input w-full min-h-50 p-4 bg-[#0f172a] rounded-xl text-base resize-y mb-5" id="textInput" placeholder="Start Typing..." maxlength="280"></textarea>

            <div class="counter-wrapper flex flex-col gap-3">
                <div class="counter-info flex items-center justify-end gap-[6px] text-[16px]">
                    <span class="current-count text-[#f1f5f9] font-semibold" id="currentCount">0</span>
                    <span class="separator text-[#f1f5f9] font-semibold">/</span>
                    <span class="max-count text-[#f1f5f9] font-semibold">280</span>
                </div>

                <div class="progress-bar w-full h-[6px] bg-[#334155] overflow-hidden">
                    <div class="progress-fill w-[0%] rounded-2xl h-full bg-gradient-to-r from-indigo-500 from-10% via-sky-500 via-30% to-emerald-500 to-90% ..." id="progressFill"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
